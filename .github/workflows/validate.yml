name: Validate examples

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ESPHome
        run: pip install esphome
      - name: Create dummy secrets
        run: |
          cat > /tmp/secrets.yaml <<'EOF'
          wifi_ssid: "test-ssid"
          wifi_password: "test-password"
          EOF
      - name: Validate examples with local component source
        run: |
          for f in examples/*.yaml; do
            base="$(basename "$f")"
            echo "::group::Validating $base"
            cp "$f" "/tmp/$base"
            sed -i "s|github://YOUR_GITHUB_USERNAME/hxlight-ble-adv-esphome@main|$PWD/components|" "/tmp/$base"
            esphome config "/tmp/$base"
            echo "::endgroup::"
          done
