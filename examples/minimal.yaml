esphome:
  name: joofo-floor-lamp-proxy
  friendly_name: JOOFO Floor Lamp Proxy
  min_version: "2026.6.1"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: github://YOUR_GITHUB_USERNAME/hxlight-ble-adv-esphome@main
    components: [hxlight_ble_adv]

hxlight_ble_adv:
  id: hxlight_controller
  adv_interval_min: 30ms
  adv_interval_max: 30ms
  adv_duration: 2000ms
  adv_gap: 60ms
  max_queue_size: 32

light:
  - platform: hxlight_ble_adv
    id: floor_lamp
    name: "Floor Lamp"
    controller_id: hxlight_controller
    # device_prefix is omitted: pair from the app using the button below.
    # (To pin a known lamp instead, add e.g. device_prefix: "6db643593a60a7a1")
    cold_white_color_temperature: 5000 K
    warm_white_color_temperature: 3000 K
    default_transition_length: 0s
    restore_mode: RESTORE_DEFAULT_OFF
    # Press this button in Home Assistant, then press ON/OFF in the HXLight app
    # within 30s. The lamp learns its device_prefix and rolling sequence.
    pair_sync:
      name: "Floor Lamp Pair/Sync"
    # Shows live pairing status: Unpaired / Waiting for app (30s) / Paired / Synced.
    pair_sync_status:
      name: "Floor Lamp Sync Status"
